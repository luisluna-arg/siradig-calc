name: siradig-calc

services:
  postgres:
    image: postgres:15-alpine
    container_name: siradig-calc-postgres
    environment:
      POSTGRES_USER: siradig
      POSTGRES_PASSWORD: siradig
      POSTGRES_DB: siradig-calc
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - siradig_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siradig -d siradig-calc"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    container_name: siradig-calc-api
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    ports:
      - "5131:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgresDb: "Host=postgres;Port=5432;Database=siradig-calc;Username=siradig;Password=siradig"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - siradig_network

  frontend:
    container_name: siradig-calc-frontend
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:5131
    ports:
      - "5173:3000"
    environment:
      API_URL: http://api:8080
    depends_on:
      - api
    networks:
      - siradig_network

volumes:
  postgres_data:

networks:
  siradig_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/16
